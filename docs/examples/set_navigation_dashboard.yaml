# ── Example 2: Automation — send home when leaving work ──────────────────
# Automatically sends "Drive Home" when you leave your work zone.

---
alias: "Send navigation home when leaving work"
trigger:
  - platform: zone
    entity_id: device_tracker.your_phone
    zone: zone.work
    event: leave
condition:
  - condition: state
    entity_id: binary_sensor.santa_fe_engine_is_running
    state: "on"
action:
  - service: kia_uvo.set_navigation
    target:
      device_id: <DEVICE_ID>
    data:
      latitude: 50.0647
      longitude: 19.9450
      name: "Dom"

# ── Example 3: Script with confirmation notification ────────────────────

---
alias: "Send navigation with confirmation"
sequence:
  - service: kia_uvo.set_navigation
    target:
      device_id: <DEVICE_ID>
    data:
      latitude: 52.5251
      longitude: 13.3694
      name: "Berlin Central Station"
      address: "Europaplatz 1, 10557 Berlin"
  - service: notify.mobile_app_your_phone
    data:
      title: "Nawigacja"
      message: "Cel podróży wysłany: Berlin Central Station"
