# set_navigation Dashboard Examples
#
# Copy these cards to your Home Assistant dashboard.
# Replace <DEVICE_ID> with your vehicle's device ID
# (found in Settings > Devices > your vehicle, or via Developer Tools).
#
# The set_navigation service sends a POI destination to the car's
# built-in navigation. Only EU/AU/CN/IN regions are supported.

# ── Example 1: Predefined destination buttons ──────────────────────────
# Add these as separate button cards on your dashboard.

---
type: button
name: "Nawigacja: Berlin Hbf"
icon: mdi:navigation-variant
tap_action:
  action: call-service
  service: kia_uvo.set_navigation
  target:
    device_id: <DEVICE_ID>
  data:
    latitude: 52.5251
    longitude: 13.3694
    name: "Berlin Central Station"
    address: "Europaplatz 1, 10557 Berlin"

