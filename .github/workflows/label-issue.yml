name: Label Issue by Region and Brand

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse issue body and add labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const body = context.payload.issue.body;
            const labels = [];

            // Extract Region
            const regionMatch = body.match(/### Region\s*\n\s*(EU|CA|USA|AUS|China|India|NZ)/);
            if (regionMatch) {
              labels.push(regionMatch[1]);
            }

            // Extract Brand
            const brandMatch = body.match(/### Brand of Car\s*\n\s*(Hyundai|Kia|Genesis)/);
            if (brandMatch) {
              labels.push(brandMatch[1]);
            }

            // Add labels to issue
            if (labels.length > 0) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
